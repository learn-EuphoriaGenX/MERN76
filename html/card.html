<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .container {
            background-color: rgb(238, 142, 142);
            width: 600px;
            height: 200px;

            display: flex;
            flex-direction: row;

            justify-content: space-around;
            /* flex-start, flex-end, center, space-between, space-around, space-evenly */


        }

        .box {
            height: 100px;
            width: 100px;
        }

        #box1 {
            background-color: rgb(170, 108, 232);
        }

        #box2 {
            background-color: rgb(118, 233, 118);
        }

        #box3 {
            background-color: rgb(101, 101, 222);
            align-self: center;
        }

        #box4 {
            background-color: rgb(231, 231, 109);
            align-self: flex-end;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="box" id="box1"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box4"></div>

    </div>


</body>

</html>
